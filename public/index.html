<!DOCTYPE html>
<html>
<head>
<title>Arnotts</title>

<style>
body { margin:0; font-family: Arial; background:#f5f5f5; }

/* TOP STRIP */
.top-strip {
  background:#111;
  color:white;
  text-align:center;
  padding:8px;
  font-size:13px;
}

/* HEADER */
.header { background:white; padding:10px 40px; }

.header-top {
  display:flex;
  justify-content:space-between;
  font-size:13px;
}

.logo {
  text-align:center;
  font-size:32px;
  letter-spacing:6px;
  margin-top:10px;
}

/* SEARCH + ICONS */
.search-box {
  border:none;
  border-bottom:1px solid #ccc;
}

.icon { margin-left:15px; cursor:pointer; }

/* NAV */
.nav {
  display:flex;
  justify-content:center;
  gap:25px;
  padding:10px;
  background:white;
}

.nav a {
  cursor:pointer;
  text-decoration:none;
  color:black;
  position:relative;
  padding:5px 10px;
  border-radius:5px;
}

.nav a:hover {
  background:#f0f0f0;
  color:#0e6f7d;
}

.nav a::after {
  content:"";
  position:absolute;
  width:0%;
  height:2px;
  bottom:-5px;
  left:0;
  background:#0e6f7d;
  transition:0.3s;
}

.nav a:hover::after {
  width:100%;
}

/* HERO */
.hero {
  margin:20px;
  height:300px;
  background:linear-gradient(#d7a86e,#0e6f7d);
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.shop-btn {
  margin-top:20px;
  background:black;
  color:white;
  padding:10px 25px;
  border-radius:20px;
  cursor:pointer;
}

/* PRODUCTS */
.products { padding:20px; }

.grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.card {
  background:white;
  padding:10px;
}

.card img {
  width:100%;
  height:220px;
  object-fit:cover;
}

.brand { font-weight:bold; }
.name { color:#555; }

.old {
  text-decoration:line-through;
  color:#999;
}

.new {
  color:red;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="top-strip">
Pay in 3 With Klarna(0% Apr)&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;Enjoy 3 Hours Car Parking for €9*&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;Join Encore Loyalty Now & Unlock Exclusive Rewards
</div>

<div class="header">

  <div class="header-top">
    <div>
      🌐 IE (€) &nbsp; 👤 Log In &nbsp; 📅 Appointments
    </div>

    <div>
      <input class="search-box" placeholder="SEARCH">
      <span class="icon">♡</span>
      <span class="icon">🛍️</span>
    </div>
  </div>

  <div class="logo">ARNOTTS</div>

</div>

<!-- NAV -->
<div class="nav">
  <a onclick="loadProducts()">Home</a>
  <a onclick="loadProducts('men')">Men</a>
  <a onclick="loadProducts('women')">Women</a>
  <a onclick="loadProducts('beauty')">Beauty</a>
  <a onclick="loadProducts('homeware')">Homeware</a>
</div>

<!-- HERO -->
<div class="hero">
  <h2>SAVE ON HOME</h2>
  <h1>UP TO 50% OFF*</h1>
  <div class="shop-btn" onclick="loadProducts('homeware')">Shop</div>
</div>

<!-- PRODUCTS -->
<div class="products">
  <h2 id="title">All Products</h2>
  <div id="products" class="grid"></div>
</div>

<script>
async function loadProducts(category = "") {

  let url = "/api/products";

  if(category){
    url += "?category=" + category;
    document.getElementById("title").innerText =
      category.charAt(0).toUpperCase() + category.slice(1);
  } else {
    document.getElementById("title").innerText = "All Products";
  }

  const res = await fetch(url);
  const data = await res.json();

  document.getElementById("products").innerHTML =
    data.map(p => `
      <div class="card">
        <img src="${p.image}">
        <div class="brand">${p.brand}</div>
        <div class="name">${p.name}</div>

        ${
          p.oldPrice
          ? `<div>
              <span class="old">€${p.oldPrice}</span>
              <span class="new"> €${p.price}</span>
            </div>`
          : `<div>€${p.price}</div>`
        }
      </div>
    `).join('');
}

loadProducts();
</script>

</body>
</html>
