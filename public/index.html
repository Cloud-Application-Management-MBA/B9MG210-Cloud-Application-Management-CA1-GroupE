<!DOCTYPE html>
<html>
<head>
    <title>Arnotts Store Dublin</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background-color: #000;
            color: white;
            height: 100vh;
            padding: 20px;
        }

        .sidebar h2 {
            color: #f4c542;
        }

        .sidebar img {
            width: 150px;
            margin-bottom: 20px;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .sidebar li {
            margin: 15px 0;
            cursor: pointer;
        }

        /* Main content */
        .main {
            flex: 1;
            padding: 20px;
            background-color: #f5f5f5;
        }

        .header {
            font-size: 28px;
            margin-bottom: 20px;
        }

        /* Products */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.2);
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
        }

        .card h3 {
            margin: 10px 0;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        .btn {
            margin-top: 10px;
            padding: 8px 12px;
            background-color: black;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #333;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Arnotts_logo.png/320px-Arnotts_logo.png" alt="Arnotts Logo">
        <h2>Arnotts</h2>
        <ul>
            <li>Home</li>
            <li>Men</li>
            <li>Women</li>
            <li>Electronics</li>
            <li>Offers</li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">
        <div class="header">Welcome to Arnotts Cloud Store</div>

        <div class="products">

            <div class="card">
                <img src="https://images.unsplash.com/photo-1528701800489-20be3c1c3c7a">
                <h3>Running Shoes</h3>
                <p class="price">€50</p>
                <button class="btn">Add to Cart</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1521334884684-d80222895322">
                <h3>Winter Jacket</h3>
                <p class="price">€120</p>
                <button class="btn">Add to Cart</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1512499617640-c2f999098c01">
                <h3>Smart Watch</h3>
                <p class="price">€200</p>
                <button class="btn">Add to Cart</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d">
                <h3>Headphones</h3>
                <p class="price">€80</p>
                <button class="btn">Add to Cart</button>
            </div>

        </div>
    </div>

</body>
</html>
