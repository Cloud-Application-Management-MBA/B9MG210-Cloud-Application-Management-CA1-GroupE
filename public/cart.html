<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Your Cart</h1>

<table class="cart-table">
  <thead>
    <tr>
      <th>Item</th>
      <th>Qty</th>
      <th>Price</th>
      <th></th>
    </tr>
  </thead>

  <tbody id="cart-items"></tbody>

  <tfoot>
    <tr>
      <td colspan="2"><strong>Total</strong></td>
      <td id="total-price"><strong>€0</strong></td>
      <td></td> <!-- empty cell under delete column -->
    </tr>
  </tfoot>
</table>

<div class="cart-buttons">
  <button onclick="window.location.href='index.html'">Continue Shopping</button>
  <button onclick="checkout()">Ready for Payment</button>
</div>

<script src="script.js"></script>

<script src="script.js"></script>

<script>
function loadCart(){
  fetch('/api/cart')
    .then(res => res.json())
    .then(data => {

      let table = document.getElementById("cart-items");
      let total = 0;

      table.innerHTML = "";

      data.forEach(item => {
        total += item.price * item.quantity;

        table.innerHTML += `
          <tr>
            <td>${item.name}</td>
            <td>${item.quantity}</td>
            <td>€${item.price}</td>
            <td>
              <button class="remove-btn" onclick="removeItem(${item.id})">❌</button>
            </td>
          </tr>
        `;
      });

      document.getElementById("total-price").innerText = "€" + total;
    });
}


// REMOVE ITEM
function removeItem(id){
  fetch('/api/cart/' + id, { method: 'DELETE' })
    .then(() => loadCart());
}


// LOAD ON START
loadCart();
</script>

</body>
</html>
